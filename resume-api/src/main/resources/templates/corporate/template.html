<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title th:text="${basics['name']}">Resume</title>
    <style type="text/css">
        @page {
            size: letter;
            margin: 0.5in;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #111;
            margin: 0;
            padding: 0;
            line-height: 1.4;
        }
        .header {
            margin-bottom: 25px;
        }
        .name {
            font-size: 34pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.1;
        }
        .title {
            font-size: 14pt;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 300;
            color: #333;
        }
        .layout-table {
            width: 100%;
            border-collapse: collapse;
        }
        .layout-table td {
            vertical-align: top;
        }
        .col-left {
            width: 32%;
            padding-right: 25px;
        }
        .col-right {
            width: 68%;
        }
        .section-title {
            font-size: 13pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            border-bottom: 2px solid #111;
            padding-bottom: 4px;
            margin-top: 25px;
        }
        .section-title.first {
            margin-top: 0;
        }
        /* Contact */
        .contact-item {
            font-size: 10pt;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .contact-icon {
            display: inline-block;
            width: 22px;
            font-weight: bold;
            vertical-align: top;
        }
        .contact-text {
            display: inline-block;
            width: calc(100% - 25px);
            word-wrap: break-word;
            vertical-align: top;
        }
        /* Education */
        .edu-date {
            font-size: 10pt;
            font-weight: normal;
            margin-bottom: 2px;
            color: #444;
        }
        .edu-inst {
            font-size: 10pt;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .edu-deg {
            font-size: 10pt;
            margin-bottom: 4px;
        }
        .edu-hl {
            font-size: 10pt;
            margin: 0 0 12px 15px;
            padding: 0;
        }
        /* Skills */
        .skills-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .skills-list li {
            font-size: 10pt;
            margin-bottom: 6px;
        }
        .skills-list li::before {
            content: "•";
            margin-right: 8px;
            color: #555;
        }
        /* Profile */
        .profile-text {
            font-size: 10pt;
            text-align: justify;
            line-height: 1.5;
            color: #333;
        }
        /* Experience Timeline */
        .timeline {
            border-left: 1px solid #777;
            margin-left: 6px;
            padding-left: 15px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 18px;
        }
        .timeline-item::before {
            content: "";
            position: absolute;
            left: -19px;
            top: 4px;
            width: 7px;
            height: 7px;
            background: #777;
            border-radius: 50%;
        }
        .exp-header {
            display: table;
            width: 100%;
            margin-bottom: 3px;
        }
        .exp-company {
            display: table-cell;
            font-weight: bold;
            font-size: 11pt;
            text-align: left;
        }
        .exp-date {
            display: table-cell;
            font-size: 10pt;
            text-align: right;
            color: #555;
        }
        .exp-title {
            font-size: 10.5pt;
            color: #333;
            margin-bottom: 5px;
        }
        .exp-bullets {
            font-size: 10pt;
            margin: 0 0 0 15px;
            padding: 0;
            text-align: justify;
            color: #444;
        }
        .exp-bullets li {
            margin-bottom: 4px;
        }
        /* Certifications */
        .cert-header {
            display: table;
            width: 100%;
            margin-bottom: 2px;
        }
        .cert-name {
            display: table-cell;
            font-weight: bold;
            font-size: 10pt;
        }
        .cert-date {
            display: table-cell;
            font-size: 10pt;
            color: #555;
            text-align: right;
        }
        .cert-issuer {
            font-size: 10pt;
            font-style: italic;
            color: #444;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="name" th:text="${basics['name']}">RICHARD SANCHEZ</div>
    <div class="title" th:text="${basics['title']}">MARKETING MANAGER</div>
</div>

<table class="layout-table">
    <tr>
        <td class="col-left">
            <div class="section-title first">Contact</div>
            <div th:if="${basics['phone'] != null}" class="contact-item">
                <span class="contact-icon">☎</span><span class="contact-text" th:text="${basics['phone']}">+123-456-7890</span>
            </div>
            <div th:if="${basics['email'] != null}" class="contact-item">
                <span class="contact-icon">✉</span><span class="contact-text" th:text="${basics['email']}">hello@reallygreatsite.com</span>
            </div>
            <div th:if="${basics['linkedin'] != null}" class="contact-item">
                <span class="contact-icon">in</span><span class="contact-text" th:text="${basics['linkedin']}">linkedin.com/in/</span>
            </div>
            <div th:if="${basics['github'] != null}" class="contact-item">
                <span class="contact-icon">gh</span><span class="contact-text" th:text="${basics['github']}">github.com/</span>
            </div>

            <div th:if="${education != null and !#lists.isEmpty(education)}">
                <div class="section-title">Education</div>
                <div th:each="edu : ${education}" style="margin-bottom: 14px;">
                    <div class="edu-date" th:if="${edu['date'] != null}" th:text="${edu['date']}">2025 - 2029</div>
                    <div class="edu-inst" th:text="${edu['institution']}">UNIVERSITY</div>
                    <div class="edu-deg" th:text="${edu['degree']}">Degree</div>
                    <ul class="edu-hl" th:if="${edu['highlights'] != null and !#lists.isEmpty(edu['highlights'])}">
                        <li th:each="hl : ${edu['highlights']}" th:text="${hl}">Detail</li>
                    </ul>
                </div>
            </div>

            <div th:if="${skills != null and !#lists.isEmpty(skills)}">
                <div class="section-title">Skills</div>
                <ul class="skills-list">
                    <li th:each="entry : ${skills}">
                        <strong th:text="${entry.key} + ':'">Category:</strong>
                        <span th:text="${entry.value}">Skill</span>
                    </li>
                </ul>
            </div>
        </td>
        
        <td class="col-right">
            <div th:if="${basics['summary'] != null}">
                <div class="section-title first">Profile</div>
                <div class="profile-text" th:text="${basics['summary']}">
                    Summary text...
                </div>
            </div>

            <div th:if="${experience != null and !#lists.isEmpty(experience)}">
                <div class="section-title">Work Experience</div>
                
                <div class="timeline">
                    <div class="timeline-item" th:each="exp : ${experience}">
                        <div class="exp-header">
                            <div class="exp-company" th:text="${exp['company']}">Company</div>
                            <div class="exp-date" th:if="${exp['date'] != null}" th:text="${exp['date']}">Date</div>
                        </div>
                        <div class="exp-title" th:text="${exp['title']}">Title</div>
                        <ul class="exp-bullets" th:if="${exp['highlights'] != null and !#lists.isEmpty(exp['highlights'])}">
                            <li th:each="hl : ${exp['highlights']}" th:text="${hl}">Highlight</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div th:if="${certifications != null and !#lists.isEmpty(certifications)}">
                <div class="section-title">Certifications</div>
                <div th:each="cert : ${certifications}">
                    <div class="cert-header">
                        <div class="cert-name" th:text="${cert['name']}">Cert</div>
                        <div class="cert-date" th:if="${cert['date'] != null}" th:text="${cert['date']}">Date</div>
                    </div>
                    <div class="cert-issuer" th:if="${cert['issuer'] != null}" th:text="${cert['issuer']}">Issuer</div>
                </div>
            </div>

        </td>
    </tr>
</table>

</body>
</html>
