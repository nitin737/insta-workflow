<div class="slide-inner" id="slide-5" style="background-image: url('/other-bg.png');">
    <div class="slide-header">
        <div class="slide-badge badge-ai">GET STARTED</div>
        <div class="footer-page">5 / 5</div>
    </div>
    <div class="glow-accent-1"></div>
    <div class="glow-accent-2"></div>
    <div class="slide-content" style="gap: 20px; justify-content: center;">
        <h2 class="slide-title-h1" style="font-size: 3.2rem; text-align: center; margin-bottom: 10px;" th:text="${carousel.slide5.headline}">Add This to Your Go.mod Today.</h2>
        <div class="code-block" style="background: rgb(13, 17, 23); border: 1px solid rgb(48, 54, 61); padding: 16px; border-radius: 8px;">
            <code style="color: rgb(88, 166, 255); font-family: var(--font-mono);" th:text="${carousel.slide5.quickstart}">$ go get github.com/spf13/cobra@latest</code>
        </div>
        <div class="code-block" style="margin-top: 10px;">
            <div class="code-block-header">
                <div class="code-tab">main.go</div>
            </div>
            <pre style="color: rgb(212, 212, 212); font-size: 0.9rem; text-shadow: none; font-family: Menlo, Monaco, Consolas, &quot;Andale Mono&quot;, &quot;Ubuntu Mono&quot;, &quot;Courier New&quot;, monospace; direction: ltr; text-align: left; white-space: pre; word-spacing: normal; word-break: normal; line-height: 1.5; tab-size: 4; hyphens: none; padding: 16px; margin: 0px; overflow: auto; background: transparent;"><code class="language-go" style="white-space: pre; color: rgb(212, 212, 212); font-size: 13px; text-shadow: none; font-family: Menlo, Monaco, Consolas, &quot;Andale Mono&quot;, &quot;Ubuntu Mono&quot;, &quot;Courier New&quot;, monospace; direction: ltr; text-align: left; word-spacing: normal; word-break: normal; line-height: 1.5; tab-size: 4; hyphens: none;" th:text="${carousel.slide5.minimalSetup}">import "github.com/spf13/cobra" ...</code></pre>
        </div>
        <div style="display: flex; gap: 24px; margin-top: 20px;">
            <div class="s5-resources" style="flex: 1 1 0%; padding: 20px; background: rgba(255, 255, 255, 0.03); border-radius: 12px;">
                <div style="margin-bottom: 12px; color: rgb(203, 213, 225); font-weight: 600; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.05em;">Resources</div>
                <div class="s5-resource-item" style="margin-bottom: 8px;" th:each="resource : ${carousel.slide5.resources}">
                    <span class="s5-resource-icon">??</span>
                    <span class="s5-resource-label" style="color: rgb(248, 250, 252); font-weight: 500; margin-right: 8px;" th:text="${resource.label} + ':'">Read the Docs:</span>
                    <span class="s5-resource-url" style="color: rgb(0, 173, 216);" th:text="${resource.url}">cobra.dev</span>
                </div>
            </div>
        </div>
    </div>
    <div class="slide-footer">
        <div class="footer-handle" th:text="'@' + ${carousel.slide1.owner}">@golang_verse</div>
        <div class="footer-action">Save Post ??</div>
    </div>
</div>
