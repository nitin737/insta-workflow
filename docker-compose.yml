services:
  insta-api:
    build:
      context: ./insta-api
      dockerfile: Dockerfile
    pull_policy: build
    env_file:
      - .env
    ports:
      - "${SPRING_BOOT_PORT:-8081}:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/instaworkflow
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  resume-api:
    build:
      context: ./resume-api
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      - "8082:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=instaworkflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
